<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Cinzel', serif;
        background: radial-gradient(circle at top, #1a1d24, #0a0b0e);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
    }

    .box {
        max-width: 650px;
        padding: 35px;
        border-radius: 10px;
        border: 1px solid #3a3f4a;
        background: rgba(0,0,0,0.6);
        box-shadow: 0 0 40px rgba(0,0,0,0.9);
    }

    h1 {
        font-size: 2.2rem;
        background: linear-gradient(180deg, #ffffff, #9ba0ab);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
    }

    p {
        font-size: 1rem;
        color: #d7dbe3;
        line-height: 1.6;
        margin-bottom: 25px;
    }

    .qr-section {
        margin-top: 25px;
    }

    .qr-section h3 {
        color: #d7dbe3;
        margin-bottom: 10px;
    }

    .qr-img {
        width: 220px;
        border-radius: 10px;
        margin-top: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
        background: white;
        padding: 10px;
    }

    .back {
        display: inline-block;
        margin-top: 30px;
        padding: 10px 20px;
        border: 1px solid white;
        text-decoration: none;
        color: white;
        border-radius: 5px;
        transition: 0.3s;
    }

    .back:hover {
        background: white;
        color: black;
    }
</style>
</head>

<body>

<div class="box">

    <h1>Support the Manga</h1>

    <p>
        Any donation you kindly give will be a great help to me in continuing the manga. Thank you very much for your support.
    </p>

    <!-- GCash QR -->
    <div class="qr-section">
        <h3>Scan to Donate (GCash)</h3>
        <img src="assets/gcash-qr.jpg" alt="GCash QR" class="qr-img">
    </div>

    <!-- PayPal QR -->
    <div class="qr-section">
        <h3>Scan to Donate (PayPal)</h3>
        <img src="assets/paypal-qr.jpg" alt="PayPal QR" class="qr-img">
    </div>

    <a class="back" href="index.html">← Back to Home</a>

</div>

</body>
</html>
