<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>15th_Century_Norgediantic_Arc</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4881027733496718"
    crossorigin="anonymous"></script>

    <style>
        /* === GLOBAL STYLES & PREMIUM BACKGROUND === */
        :root {
            --dark-bg: #0a0b0e;
            --stone-border: #424651;
            --gold-accent: #378dd4;
            --gold-dark: #14448b;
            /* New Metallic White Palette */
            --metallic-white: linear-gradient(180deg, #ffffff 0%, #e0e4eb 45%, #9ba0ab 50%, #ccd1d9 100%);
            --silver-shine: drop-shadow(0px 2px 2px rgba(0,0,0,0.8)) drop-shadow(0px 0px 5px rgba(255,255,255,0.2));
            --button-grad-top: #ffffff;
            --button-grad-bottom: #9ba0ab;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(35, 40, 50, 0.4) 0%, rgba(5, 6, 8, 0.95) 80%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            font-family: 'Cinzel', serif;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .main-container {
            width: 100%;
            max-width: 650px;
            padding: 25px 20px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* === STORM EFFECT === */
        .storm {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            background: transparent;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.95);
            animation: lightning 12s infinite;
        }

        @keyframes lightning {
            0%, 93%, 96%, 98%, 100% { background-color: transparent; }
            94% { background-color: rgba(200, 220, 255, 0.08); }
            97% { background-color: rgba(200, 220, 255, 0.15); }
            99% { background-color: rgba(255, 255, 255, 0.25); }
        }

        /* === HEADER / TITLE (Updated to Metallic White) === */
        header {
            text-align: center;
            margin-top: 10px;
            position: relative;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }

        .title {
            background: var(--metallic-white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.1;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            filter: var(--silver-shine);
        }

        .title span {
            font-size: 2.8rem;
            font-weight: 900;
            display: block;
            margin-top: 5px;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 40%, #8a919e 50%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.9)) drop-shadow(0px 0px 8px rgba(255,255,255,0.1));
        }

        header::after {
            content: "";
            display: block;
            width: 250px;
            height: 20px;
            margin: 20px auto 0;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg"><path d="M50 18 C 30 18, 10 5, 0 8 C 20 8, 40 12, 50 12 C 60 12, 80 8, 100 8 C 90 5, 70 18, 50 18 Z" fill="white" fill-opacity="0.6"/><circle cx="50" cy="8" r="3" fill="white"/></svg>');
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.7;
        }

        /* === POSTER SECTION === */
        .poster-section {
            position: relative;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            padding: 0 15px;
        }

        .poster-section::before, .poster-section::after {
            content: '';
            position: absolute;
            top: 5%;
            bottom: 5%;
            width: 45px;
            background: linear-gradient(to right, #e3cba8, #c1a478, #947b54);
            box-shadow: inset 0 0 20px rgba(100, 60, 20, 0.6), 0 15px 25px rgba(0,0,0,0.9);
            z-index: 1;
            border: 1px solid rgba(80, 50, 20, 0.5);
        }
        .poster-section::before { left: 0px; border-radius: 8px 0 0 8px; transform: skewY(-2deg); }
        .poster-section::after { right: 0px; border-radius: 0 8px 8px 0; transform: skewY(2deg); background: linear-gradient(to left, #e3cba8, #c1a478, #947b54); }

        .poster-frame {
            position: relative;
            z-index: 2;
            width: 100%;
            background: #000;
            border: 2px solid #111;
            padding: 4px;
            border-radius: 3px;
            box-shadow: 0 0 0 6px #2a2d34, 0 0 0 8px #15171a, 0 25px 50px rgba(0,0,0,1), inset 0 0 30px rgba(0,0,0,1);
        }

        .poster-frame::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: none;
            z-index: 3;
        }

        #posterImage {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            border-radius: 1px;
            min-height: 400px;
            background: url('https://images.unsplash.com/photo-1541480138986-e3b97b1a0300?q=80&w=800&auto=format&fit=crop') center/cover;
            filter: contrast(1.1) brightness(0.9);
        }

        /* === LANGUAGE MENU === */
        .language-menu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .language-menu a {
            text-decoration: none;
        }

        .lang {
            background: linear-gradient(180deg, var(--button-grad-top) 0%, #c4c8d1 40%, var(--button-grad-bottom) 100%);
            border: 1px solid #fff;
            border-radius: 4px;
            padding: 12px 25px;
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            font-weight: 900;
            color: #1a1c20; 
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 130px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-shadow: 0 1px 1px rgba(255,255,255,0.9);
            box-shadow: 0 6px 12px rgba(0,0,0,0.8), inset 0 2px 4px rgba(255,255,255,0.8), inset 0 -3px 6px rgba(0,0,0,0.4);
        }

        .lang:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.1);
        }

        /* === ADS SECTION === */
        .ads-section {
            background: linear-gradient(to bottom, #16181d, #0d0f12);
            border: 1px solid #2a2d35;
            border-top: 2px solid #3a3f4a;
            padding: 20px;
            margin-top: 15px;
            border-radius: 6px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 15px 30px rgba(0,0,0,0.9);
            position: relative;
        }

        .ads-title {
            text-align: center;
            background: var(--metallic-white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .ads-box {
            background-color: rgba(255,255,255,0.03);
            border: 1px dashed #3a3f4a;
            color: #555;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            overflow: hidden;
        }

        /* === CUSTOM MODAL === */
        .custom-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(3px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .custom-modal-box {
            background: linear-gradient(135deg, #1c1f26, #0d0f12);
            border: 1px solid #4a4e59;
            border-top: 2px solid #fff;
            padding: 35px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            max-width: 80%;
        }

        .custom-modal-box p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            background: var(--metallic-white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.5;
            font-weight: 700;
        }

        .custom-modal-box button {
            background: linear-gradient(180deg, #ffffff, #9ba0ab);
            color: #000;
            border: none;
            padding: 10px 30px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            cursor: pointer;
            border-radius: 3px;
        }

        /* === SMALL METALLIC SIDE BUTTONS (TOP-RIGHT) === */
        .side-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .nav-btn {
            text-decoration: none;
            background: var(--metallic-white);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2px;
            padding: 5px 12px;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            font-weight: 900;
            color: #1a1c20;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transition: all 0.2s ease-in-out;
            min-width: 85px;
        }

        .nav-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>

<div class="storm"></div>

<div class="side-buttons">
    <a href="about.html" class="nav-btn">About</a>
    <a href="contact.html" class="nav-btn">Contact</a>
    <a href="donation.html" class="nav-btn">Donation</a>
    <a href="privacy.html" class="nav-btn">Privacy</a>
    <a href="terms.html" class="nav-btn">Terms</a>
</div>

<div class="main-container">

  <header>
    <h1 class="title">
      15th Century<br>
      <span>Norgediantic Arc</span>
    </h1>
  </header>

  <section class="poster-section">
    <div class="poster-frame">
      <img id="posterImage" src="assets/poster.jpg" alt="Poster" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1541480138986-e3b97b1a0300?q=80&w=800&auto=format&fit=crop'">
    </div>
  </section>

  <section class="language-menu">
    <a href="chapter.html">
      <button class="lang">☀ Tagalog</button>
    </a>
    <button class="lang" onclick="showModal('✒ English version not available yet')">✒ English</button>
    <button class="lang" onclick="showModal('あ Hiragana version not available yet')">あ Hiragana</button>
  </section>

  <section class="ads-section">
    <div class="ads-title">Advertisement</div>
    <div class="ads-box">
        <ins class="adsbygoogle"
             style="display:block; text-align:center;"
             data-ad-layout="in-article"
             data-ad-format="fluid"
             data-ad-client="ca-pub-4881027733496718"
             data-ad-slot="YOUR_AD_SLOT_HERE"></ins> <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>
  </section>

</div>

<div class="custom-modal-overlay" id="customModal">
    <div class="custom-modal-box">
        <p id="modalMessage">Message here</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    function showModal(message) {
        document.getElementById('modalMessage').innerText = message;
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }
    window.onclick = function(event) {
        let modal = document.getElementById('customModal');
        if (event.target === modal) closeModal();
    }
</script>

</body>
</html>
