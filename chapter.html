<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* === GLOBAL STYLES === */
        :root {
            --dark-bg: #0a0b0e;
            --metallic-white: linear-gradient(180deg, #ffffff 0%, #e0e4eb 45%, #9ba0ab 50%, #ccd1d9 100%);
            --silver-shine: drop-shadow(0px 2px 2px rgba(0,0,0,0.8)) drop-shadow(0px 0px 5px rgba(255,255,255,0.2));
            --gold-accent: #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(35, 40, 50, 0.4) 0%, rgba(5, 6, 8, 0.95) 80%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 4px);
            font-family: 'Cinzel', serif;
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* === STORM EFFECT === */
        .storm {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            background: transparent;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.95);
            animation: lightning 12s infinite;
        }

        @keyframes lightning {
            0%, 93%, 96%, 98%, 100% { background-color: transparent; }
            94% { background-color: rgba(200, 220, 255, 0.08); }
            97% { background-color: rgba(200, 220, 255, 0.15); }
            99% { background-color: rgba(255, 255, 255, 0.25); }
        }

        .main-container {
            width: 100%;
            max-width: 800px; /* Nilakihan ng kaunti para sa portrait cards */
            padding: 25px 20px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        /* === HEADER / TITLE === */
        .title {
            text-align: center;
            background: var(--metallic-white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 1.1;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 3px;
            filter: var(--silver-shine);
        }

        .title span {
            font-size: 2.2rem;
            font-weight: 900;
            display: block;
            margin-top: 5px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 40%, #8a919e 50%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 3px rgba(0,0,0,0.9));
        }

        h2 {
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #8a919e;
            margin-bottom: 10px;
            position: relative;
        }

        /* === CHAPTERS GRID === */
        .chapters {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* Adjusted width for portrait */
            gap: 30px;
            padding: 10px;
        }

        .chapters a {
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .chapters a:hover {
            transform: translateY(-8px);
        }

        /* === CHAPTER CARD DESIGN (1240 x 1754 Ratio) === */
        .chapter-card {
            background: #111418;
            border: 2px solid #2d3138;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chapters a:hover .chapter-card {
            border-color: var(--gold-accent);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.25), 0 20px 40px rgba(0,0,0,1);
        }

        /* Gamit ang aspect-ratio para makuha ang 1240x1754 look */
        .chapter-card img {
            width: 100%;
            aspect-ratio: 1240 / 1754; 
            object-fit: cover;
            border-bottom: 2px solid #2d3138;
            filter: grayscale(0.2) contrast(1.1);
            transition: 0.3s ease;
            background-color: #000;
        }

        .chapters a:hover .chapter-card img {
            filter: grayscale(0) contrast(1.15);
        }

        .chapter-card p {
            padding: 15px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1rem;
            background: var(--metallic-white);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.8));
        }

        /* Ornament decoration inside card */
        .chapter-card::after {
            content: '';
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

    </style>
</head>

<body>

    <div class="storm"></div>

    <div class="main-container">

        <h1 class="title">
            15th Century<br>
            <span>Norgediantic Arc</span>
        </h1>

        <h2>Select Chapter</h2>

        <div class="chapters">

            <a href="reader.html?chapter=1">
                <div class="chapter-card">
                    <img src="Tagalog/1/chapter_1_poster.jpg" onerror="this.src='https://images.unsplash.com/photo-1514539079130-25950c84af65?q=80&w=400&auto=format&fit=crop'">
                    <p>Chapter 1</p>
                </div>
            </a>

            <a href="reader.html?chapter=2">
                <div class="chapter-card">
                    <img src="Tagalog/2/Chapter_2_Poster.png" onerror="this.src='https://images.unsplash.com/photo-1514539079130-25950c84af65?q=80&w=400&auto=format&fit=crop'">
                    <p>Chapter 2</p>
                </div>
            </a>

        </div>

    </div>

</body>
</html>
